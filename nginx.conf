# Nginx configuration for EVA Nepal website
# Place at: /etc/nginx/sites-available/evanepal.org
# Symlink: ln -s /etc/nginx/sites-available/evanepal.org /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name evanepal.org www.evanepal.org;

    # Redirect HTTP → HTTPS (enable after setting up SSL)
    # return 301 https://$host$request_uri;

    # --- Proxy to Next.js on port 3011 ---
    location / {
        proxy_pass          http://127.0.0.1:3011;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # Cache Next.js static assets aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache public folder assets
    location /static/ {
        proxy_pass http://127.0.0.1:3011;
        add_header Cache-Control "public, max-age=86400";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml application/xml
               image/svg+xml font/woff2;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/eva-nepal-access.log;
    error_log  /var/log/nginx/eva-nepal-error.log;
}

